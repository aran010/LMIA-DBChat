version: "3.9"
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./vectordb:/opt/ragapp/vectordb
      - ./uploads:/opt/ragapp/uploads
      - ./config:/opt/ragapp/config
    ports:
      - "8000:8000"
    environment:
      - DB_ERP_PASSWORD=${DB_ERP_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
